# 市場指標（クロスマーケット特徴量）
market_indices:
  - "^N225"    # 日経225
  - "^GSPC"    # S&P 500
  - "JPY=X"    # USD/JPY
  - "EURJPY=X" # EUR/JPY（追加）
  - "ES=F"     # S&P500先物（アジア時間先行指標）
  - "NQ=F"     # NASDAQ先物
  - "^TNX"     # 米国10年金利
  - "^IRX"     # 米国3ヶ月金利

# ボラティリティ指数（リスクオン/オフレジーム）
volatility_indices:
  - "^VIX"     # 米国VIX（日経VI(^N225VI)はyfinanceで取得不可のため除外）

# コモディティ指標
commodities:
  "CL=F": "WTI原油"
  "GC=F": "金"

# セクター分類（東証33業種を簡略化）
sectors:
  "7203.T": "自動車"
  "6758.T": "電機"
  "9984.T": "情報通信"
  "8306.T": "銀行"
  "6861.T": "電機"
  "1925.T": "建設"
  "2802.T": "食品"
  "2914.T": "食品"
  "4063.T": "化学"
  "4502.T": "医薬品"
  "4661.T": "サービス"
  "5401.T": "鉄鋼"
  "6501.T": "電機"
  "6981.T": "電機"
  "7011.T": "機械"
  "7751.T": "電機"
  "7974.T": "その他製造"
  "8001.T": "商社"
  "8058.T": "商社"
  "8591.T": "金融"
  "8766.T": "保険"
  "9101.T": "海運"
  "9202.T": "空運"
  "9432.T": "情報通信"
  "9983.T": "小売"
  "8705.T": "証券"
  "9380.T": "倉庫運輸"
  "8585.T": "金融"
  "8267.T": "小売"

# データ取得設定
data:
  start_date: "2015-01-01"
  interval: "1d"

# 特徴量設定
features:
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_window: 20
  bb_std: 2
  sma_windows: [5, 20, 60]
  mfi_window: 14
  lag_days: [1, 2, 3, 5, 10]

# モデル設定
model:
  test_ratio: 0.2
  n_splits: 5          # Walk-forward分割数
  target_horizon: 5    # 予測日数先（5=5営業日後）
  benchmark: "^N225"   # アルファ計算のベンチマーク（日経225）
  lgbm_params:
    objective: "binary"
    metric: "auc"
    num_leaves: 63
    learning_rate: 0.03
    n_estimators: 1000
    early_stopping_rounds: 80
    min_data_in_leaf: 10
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    verbose: -1

# Streamlit設定
dashboard:
  default_ticker: "7203.T"
  chart_days: 180
